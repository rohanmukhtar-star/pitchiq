<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PitchIQ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="logo">Pitch<span>IQ</span></div>
      <div class="tagline">Find matches. Check form. Get tickets.</div>
    </div>
    <div class="search-bar">
      <input type="text" placeholder="Search team..." id="search-input" />
    </div>
    <div class="filter-row">
      <div class="chip active" data-filter="PL">Premier League</div>
      <div class="chip" data-filter="BL">Bundesliga</div>
      <div class="chip" data-filter="SA">Serie A</div>
      <div class="chip" data-filter="PD">La Liga</div>
    </div>
    <div class="view-toggle">
      <div class="toggle-btn active" id="btn-fixtures">Fixtures</div>
      <div class="toggle-btn" id="btn-table">Table</div>
    </div>
    <div id="status-area"></div>
    <div id="main-content">
      <div class="section-label">Upcoming fixtures</div>
      <div id="fixtures-container"><div class="loading">Loading fixtures...</div></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
