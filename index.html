<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PitchIQ</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0d3320" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PitchIQ" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="logo">Pitch<span>IQ</span></div>
      <div class="tagline">Find matches. Check form. Get tickets.</div>
      <div class="stats-bar">
        <div class="stat-item">
          <div class="stat-value" id="stat-fixtures">--</div>
          <div class="stat-label">Fixtures</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-leagues">6</div>
          <div class="stat-label">Leagues</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-days">45</div>
          <div class="stat-label">Days ahead</div>
        </div>
      </div>
    </div>
    <div class="search-bar">
      <input type="text" placeholder="Search team..." id="search-input" />
    </div>
    <div class="filter-row">
      <div class="chip active" data-filter="PL">Premier League</div>
      <div class="chip" data-filter="BL">Bundesliga</div>
      <div class="chip" data-filter="SA">Serie A</div>
      <div class="chip" data-filter="PD">La Liga</div>
      <div class="chip" data-filter="FL">Ligue 1</div>
      <div class="chip" data-filter="DED">Eredivisie</div>
    </div>
    <div class="view-toggle">
      <div class="toggle-btn active" id="btn-fixtures">Fixtures</div>
      <div class="toggle-btn" id="btn-table">Table</div>
      <div class="toggle-btn" id="btn-scorers">Scorers</div>
    </div>
    <div id="status-area"></div>
    <div id="main-content">
      <div class="loading">Loading fixtures...</div>
    </div>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
  <script src="app.js"></script>
</body>
</html>
